- type: entity
  parent: BaseItem
  id: SprayPainter
  name: spray painter
  description: A spray painter for painting airlocks, pipes, and other items.
  components:
  - type: Sprite
    sprite: Objects/Tools/spray_painter.rsi
    state: spray_painter
  - type: Item
    sprite: Objects/Tools/spray_painter.rsi
  - type: ActivatableUI
    key: enum.SprayPainterUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SprayPainterUiKey.Key:
        type: SprayPainterBoundUserInterface
  - type: SprayPainter # Stories-Color-Set
    colorPalette:
      ярко-красный: '#ff4c5b'
      красный (азот/плазма): '#FF0000'
      тёмно-красный (отходы/хилиум): '#990000'
      оранжевый: "#FFA500"
      коричневый (смесь): '#947507'
      жёлтый: '#FFFF00'
      ярко-зелёный (тритий): '#66FF33'
      зелёный (нитрий): '#3AB334'
      тёмно-зелёный (аммиак): '#56941E'
      бирюзовый (воздух): '#03FCD3'
      тёмно-бирюзовый (фрезон): '#3A758C'
      голубой (ксилород): '#42AAFF'
      синий (дистра): '#0335FC'
      ярко-фиолетовый (бизет): '#9370DB'
      фиолетовый (оксид азота): '#8F00FF'
      тёмно-фиолетовый (плюоксий): '#3434AA'
      розовый: '#FF1493'
      белый (стандарт): '#FFFFFF'
      бледный (водяной пар): '#BFFFFD'
      серый (углекислый газ): '#808080'
      чёрный: '#333333'
  - type: StaticPrice
    price: 40
  - type: LimitedCharges
    maxCharges: 15
    lastCharges: 15
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  parent: SprayPainter
  id: SprayPainterRecharging
  suffix: Admeme
  components:
  - type: AutoRecharge
    rechargeDuration: 1

- type: entity
  parent: SprayPainter
  name: experimental spray painter
  description: An experimental recharging spray painter that can infinitely replicate compressed paint.
  id: SprayPainterBorg
  suffix: Borg
  components:
  - type: AutoRecharge
    rechargeDuration: 5

- type: entity
  parent: SprayPainter
  id: SprayPainterEmpty
  suffix: Empty
  components:
  - type: LimitedCharges
    lastCharges: -1

- type: entity
  parent: BaseItem
  id: SprayPainterAmmo
  name: compressed paint
  description: A cartridge of highly compressed paint, commonly used in spray painters.
  components:
  - type: SprayPainterAmmo
  - type: Sprite
    sprite: Objects/Tools/spray_painter.rsi
    state: ammo
  - type: Item
    sprite: Objects/Tools/spray_painter.rsi
    heldPrefix: ammo
  - type: PhysicalComposition
    materialComposition:
      Steel: 10
      Plastic: 10
  - type: StaticPrice
    price: 30
