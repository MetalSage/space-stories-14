- type: entity
  parent: BaseAction
  id: STActionShadowlingHatch
  name: Hatch
  description: Yields your flesh to reveal your true form. Removes all equipment.
  categories: [HideSpawnMenu]
  components:
  - type: Action
    icon:
      sprite: _Stories/Actions/shadowling.rsi
      state: hatch
    itemIconStyle: NoItem
    priority: -11
  - type: InstantAction
    event: !type:ShadowlingHatchEvent

- type: entity
  parent: BaseAction
  id: STActionShadowlingEnthrall
  name: Enthrall
  description: Allows you to enslave a conscious, non-braindead, non-catatonic human to your will.
  categories: [HideSpawnMenu]
  components:
  - type: Action
    useDelay: 60
    icon:
      sprite: _Stories/Actions/shadowling.rsi
      state: enthrall
    itemIconStyle: NoItem
    priority: -11
  - type: EntityTargetAction
    event: !type:ShadowlingEnthrallEvent
  - type: TargetAction
    range: 1

