- type: entity
  id: STActionToggleVision
  name: Toggle Night Vision
  description: Toggles a special vision mode.
  parent: BaseAction
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: _Stories/Clothing/Eyes/Glasses/nvg.rsi
      state: icon
  - type: InstantAction
    event: !type:ToggleVisionActionEvent

- type: entity
  id: STActionToggleThermal
  name: Toggle Thermal Vision
  description: Toggles a special vision mode.
  parent: BaseAction
  components:
  - type: Action
    useDelay: 1
    icon:
      sprite: _Stories/Actions/thermalVision.rsi
      state: toggle
  - type: InstantAction
    event: !type:ToggleVisionActionEvent
