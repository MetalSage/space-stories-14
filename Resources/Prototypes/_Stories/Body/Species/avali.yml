- type: markingsGroup
  parent: Undergarments
  id: Avali
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ AvaliTailBase ]
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: true
      default: [ AvaliEarsBase ]
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceAvali
  name: avali appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganAvaliTorso
      Head: OrganAvaliHead
      ArmLeft: OrganAvaliArmLeft
      ArmRight: OrganAvaliArmRight
      HandRight: OrganAvaliHandRight
      HandLeft: OrganAvaliHandLeft
      LegLeft: OrganAvaliLegLeft
      LegRight: OrganAvaliLegRight
      FootLeft: OrganAvaliFootLeft
      FootRight: OrganAvaliFootRight
      Brain: OrganHumanBrain
      Eyes: OrganAvaliEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganReptilianStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Avali

- type: entity
  save: false
  parent:
  - AppearanceMoth
  - BaseSpeciesMobOrganic
  id: MobAvali
  name: Urist C.M McRaptor
  components:
  - type: MovementAlwaysTouching
  - type: CanMoveInAir
  - type: MovementSpeedModifier
    weightlessModifier: 0.6
  - type: HumanoidProfile
    species: Avali
    hideLayersOnEquip:
    - HeadTop
    - HeadSide
  - type: Body
    prototype: Avali
  - type: Hunger
  - type: Thirst
  - type: Sprite
    drawdepth: Mobs
  - type: Vocal
    sounds:
      Male: MaleAvali
      Unsexed: MaleAvali
      Female: FemaleAvali
  - type: Speech
    speechVerb: Parrot
    speechSounds: MaleAvali
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
  - type: Inventory
    speciesId: avali

- type: entity
  parent: OrganBase
  id: OrganAvali
  abstract: true
  suffix: Avali
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  parent: OrganAvali
  id: OrganAvaliExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _Stories/Mobs/Avali/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _Stories/Mobs/Avali/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Avali

- type: entity
  id: OrganAvaliTorso
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganAvaliExternal ]
