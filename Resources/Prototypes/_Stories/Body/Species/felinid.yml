    organs:
      Torso: OrganHumanTorso
      Head: OrganHumanHead
      ArmLeft: OrganHumanArmLeft
      ArmRight: OrganHumanArmRight
      HandRight: OrganHumanHandRight
      HandLeft: OrganHumanHandLeft
      LegLeft: OrganHumanLegLeft
      LegRight: OrganHumanLegRight
      FootLeft: OrganHumanFootLeft
      FootRight: OrganHumanFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganReptilianStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid
  - type: VisualBody
    group: Felinid

- type: entity
  save: false
  parent:
  - AppearanceHuman
  - BaseSpeciesMobOrganic
  id: MobFelinid
  name: Urist McFelinid
  components:
  - type: FootstepModifier
    footstepSoundCollection: null
  - type: FlashDebuff
  - type: HumanoidProfile
    species: Felinid
    hideLayersOnEquip:
    - Hair
    - HeadTop
  - type: Body
    prototype: Felinid
  - type: Hunger
  - type: Thirst
  - type: Sprite
    drawdepth: Mobs
  - type: Vocal
    sounds:
      Male: MaleFelinid
      Unsexed: MaleFelinid
      Female: FemaleFelinid
  - type: Speech
    allowedEmotes: ['Hiss', 'Meow', 'Mew', 'Growl', 'Purr']
