  - type: VisualOrgan
    data:
      sprite: _Stories/Mobs/Customization/Kidan/eyes.rsi
      state: eyes

- type: entity
  id: OrganKidanStomach
  parent: OrganAnimalStomach
  categories: [ HideSpawnMenu ]
  components:
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 40
  - type: Stomach
    specialDigestible:
      tags:
      - Fruit
      - Meat
      - Pill
      - Crayon
      - FoodSnack

- type: entity
  id: OrganKidanLiver
  parent: OrganAnimalLiver
