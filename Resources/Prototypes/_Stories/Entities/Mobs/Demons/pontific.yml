- type: entity
  name: Pontific
  id: STMobPontific
  parent: STBaseUnholyPlayable
  description: A mysterious and sinister creature, its figure is distorted by ritual robes, covered with dark tattoos and mysterious symbols, radiating a sinister aura.
  components:
  - type: ComplexInteraction
  - type: Unholy
    resistanceCoefficient: 0.1
    ignoreProtectionImpulse: true
  - type: PassiveDamage
    allowedStates:
    - Alive
    - Critical
    damage:
      types:
        Holy: -0.07
        # Brute
        Blunt: -0.08
        Slash: -0.08
        Piercing: -0.08
        # Burn
        Heat: -0.08
        Shock: -0.08
        Cold: -0.08
        # Airloss
        Asphyxiation: -0.12
        Bloodloss: -0.12
  - type: Force
  - type: ForceUser
    shopAction: STActionPontificPrayer
    preset: STPontific
  - type: GenericVisualizer
    visuals:
      enum.PontificVisuals.State:
        enum.DamageStateVisualLayers.Base:
          Base:
            state: base
            sprite: _Stories/Mobs/Demons/pontific.rsi
          Flame:
            state: pontific_flame
            sprite: _Stories/Mobs/Demons/pontific.rsi
          Prayer:
            state: pontific_prayer
            sprite: _Stories/Mobs/Demons/pontific_prayer.rsi
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: base
      sprite: _Stories/Mobs/Demons/pontific.rsi
  - type: MobThresholds
    allowRevives: true
    thresholds:
      0: Alive
      600: Dead
  - type: MeleeWeapon
    range: 2.0
    hidden: true
    angle: 0
    soundHit:
      collection: AlienClaw
    animation: WeaponArcThrust
    wideAnimation: WeaponArcThrust
    damage:
      types:
        Slash: 15
        Blunt: 15
  - type: SlowOnDamage
    speedModifierThresholds:
      450: 0.9
      500: 0.8
      550: 0.7
  - type: Pontific
    actions:
    - STActionPontificBloodyAltar
    - STActionPontificSpawnMonk
    - STActionPontificSpawnGuardian
    - STActionPontificFelLightning
    - STActionPontificFlameSwords
    - STActionPontificKudzu
  - type: MovementSpeedModifier
    baseWalkSpeed: 4
    baseSprintSpeed: 5
  - type: Damageable
    damageContainer: BiologicalMetaphysical
    damageModifierSet: STPontificModifierSet
  - type: Stamina
    animationThreshold: 100
    baseCritThreshold: 200
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - FootstepSound
    - StunImmune

- type: damageModifierSet
  id: STPontificModifierSet
  coefficients:
    Blunt: 0.5
    Slash: 0.5
    Heat: 0.5
    Cold: 0.5
    Piercing: 0.5
    Caustic: 0.9
    Holy: 0.1
