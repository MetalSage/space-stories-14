- type: entity
  parent: [BaseWeaponSniper, BaseGunWieldable]
  id: STToySniper
  name: toy rifle
  description: Looks almost like a real Christ!
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,3,0
    - 0,1,3,1
  - type: Sprite
    sprite: _Stories/Objects/Fun/toy_sniper.rsi
  - type: Clothing
    sprite: _Stories/Objects/Fun/toy_sniper.rsi
  - type: GunRequiresWield
  - type: Gun
    fireRate: 0.4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeCap
    capacity: 5
    proto: CartridgeCap
  - type: SpeedModifiedOnWield
    walkModifier: 0.50
    sprintModifier: 0.50
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 0.3
  - type: StaticPrice
    price: 500
