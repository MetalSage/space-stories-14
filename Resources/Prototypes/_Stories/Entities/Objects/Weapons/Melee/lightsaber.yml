- type: entity
  name: lightsaber
  parent: EnergySword
  abstract: true
  id: STBaseLightsaber
  description: A special weapon designed for elegant combat as well as for ceremonies, its work is connected with the kyber-crystal inside.
  components:
  - type: EmitSoundOnThrow
    sound:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
  - type: Lightsaber
  - type: ItemToggleDamageContacts
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        volume: -6
        variation: 0.250
    activatedDamage:
        types:
            Slash: 7.5
            Heat: 7.5
            Structural: 2
  - type: ItemToggleDamageOtherOnHit
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedDamage:
        types:
            Slash: 7.5
            Heat: 7.5
            Structural: 2
  - type: BlockMeleeAttack
    enabled: false
    blockSound:
      path: /Audio/Weapons/eblade1.ogg
  - type: EnergySword
    colorOptions:
      - DodgerBlue
      - Aqua
      - MediumSpringGreen
      - MediumOrchid
  - type: Reflect
    reflectProb: 0.50
    spread: 90
    reflects:
      - Energy
  - type: Damageable
    damageContainer: Inorganic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 20
        mask:
        - ItemMask
        layer:
        - FlyingMobLayer
        restitution: 0.3
        friction: 0.2
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 0
  - type: DamageContacts
    soundHit:
      path: /Audio/Weapons/eblade1.ogg
    onlyTethered: true
    damage:
      types:
        Structural: 0
    ignoreWhitelist:
      components:
      - ForceUser # Чувствительные к силе отражают это, так как иначе бы это было имбой против них.

# Рапира

- type: entity
  name: lightrapier
  parent: STBaseLightsaber
  id: STLightsaberRapier
  components:
  - type: EnergySword
    colorOptions:
    - "#04ecfc"
  - type: Item
    size: Small
    sprite: _Stories/Objects/Weapons/Melee/e_rapier.rsi
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Melee/e_rapier.rsi
    layers:
      - state: e_rapier
      - state: e_rapier_blade
        visible: false
        shader: unshaded
        map: [ "blade" ]

