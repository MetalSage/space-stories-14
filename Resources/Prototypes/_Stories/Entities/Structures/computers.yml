- type: entity
  parent: BaseComputerShuttle
  id: PRISONComputerShuttle
  name: shuttle console prison
  description: Used for piloting a ship or escaping from prison.
  components:
    - type: Sprite
      sprite: _Stories/Structures/Machines/computers_sp.rsi
      layers:
        - map: ["computerLayerBody"]
          state: computer_sp
        - map: ["computerLayerKeyboard"]
          state: generic_keyboard_sp
        - map: ["computerLayerScreen"]
          state: shuttle_sp
        - map: ["computerLayerKeys"]
          state: generic_keys_sp
    - type: Computer
      board: PRISONComputerShuttleCircuitboard
    - type: DroneConsole
      components:
        - type: PrisonShuttle

- type: entity
  parent: ComputerId
  id: PRISONComputerId
  name: ID card computers
  description: Terminal for programming Nanotrasen employee ID cards to access parts of the prison.
  components:
  - type: Sprite
    sprite: _Stories/Structures/Machines/computers_sp.rsi
    layers:
        - map: ["computerLayerBody"]
          state: computer_sp
        - map: ["computerLayerKeyboard"]
          state: generic_keyboard_sp
        - map: ["computerLayerScreen"]
          state: id_sp
        - map: ["computerLayerKeys"]
          state: generic_keys_sp
  - type: IdCardConsole
    accessLevels:
    - Command
    - Bar
    - Brig
    - Security
    - Maintenance
    - External
    - Armory
    - Prisoner
    - PrisonEng
    - PrisonMed
    - Prison
    - PrisonBrig
    - HeadOfPrison
  - type: Computer
    board: PRISONComputerIdCircuitboard