- type: entity
  id: STShadowling
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 30
  - type: ShadowlingRule
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: STShadowlingSpecifier
      playerRatio: 30
      range:
        min: 1
        max: 2

- type: antagSpecifier
  id: STShadowlingSpecifier
  prefRoles: [STShadowling]
  blacklist:
    components:
    - Holy
  briefing:
    text: stories-shadowling-role-greeting
    color: DarkRed
    sound: "/Audio/Ambience/Antag/ling_alert.ogg"
  components:
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - STShadowlingMind
  - type: ActiveRadio
    channels:
    - STShadowlingMind
  - type: Shadowling
  mindRoles:
  - STMindRoleShadowling

- type: entity
  parent: BaseGameRule
  id: STPontific
  components:
  - type: GameRule
    minPlayers: 20
  - type: RuleGrids
  - type: LoadMapRule
    mapPath: /Maps/_Stories/Nonstations/pontific.yml
  - type: AntagSpawner
    prototype: STMobPontific
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    agentName: stories-pontific-round-end-agent-name
    antags:
    - !type:FixedAntagCount
      proto: STPontificSpecifier
      count: 1

- type: antagSpecifier
  id: STPontificSpecifier
  prefRoles: [STPontific]
  spawnerPrototype: STSpawnPointPontific
  mindRoles:
  - STMindRolePontific
  briefing:
    text: stories-pontific-role-greeting
    color: "#7d52a8"
    sound: /Audio/_Stories/Pontific/pontific_start.ogg
