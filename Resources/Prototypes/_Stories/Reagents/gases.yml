- type: reagent
  id: STBZ
  name: stories-reagent-name-bz
  desc: stories-reagent-desc-bz
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#9370db"
  metabolisms:
    Respiration:
      effects:
      - !type:Emote
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 0.2
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
          inverted: true
        emote: Cough
        showInChat: true
        probability: 0.1
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 0.5
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
          inverted: true
        ignoreResistances: true
        damage:
          types:
            Asphyxiation: 0.1
            Poison: 0.25
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
          inverted: true
        key: SeeingRainbows
        component: SeeingRainbows
        type: Add
        time: 1
      - !type:Emote
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 0.2
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
        emote: Laugh
        showInChat: true
        probability: 0.1
      - !type:Emote
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 0.2
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
        emote: Scream
        showInChat: true
        probability: 0.01
      - !type:PopupMessage
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 0.5
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
        type: Local
        visualType: Medium
        messages: [ "effect-sleepy" ]
        probability: 0.1
      - !type:MovementSpeedModifier
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: STBZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [ Slime ]
        key: ForcedSleep
        component: ForcedSleeping
        time: 1
        type: Add

- type: reagent
  id: STHealium
  name: stories-reagent-name-healium
  desc: stories-reagent-desc-healium
  physicalDesc: reagent-physical-desc-gaseous
  flavor: sweet
  color: "#8b0000"
  metabolisms:
    Respiration:
      effects:
      - !type:HealthChange
        ignoreResistances: true
        damage:
          groups:
            Brute: -0.5
            Burn: -0.5
            Toxin: -0.5
      - !type:ModifyBleed
        amount: -0.15
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrowsiness
        time: 0.1
        type: Remove
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: STHealium
          min: 5
        - !type:ReagentCondition
          reagent: STNitryl
          max: 0.1
        effectProto: StatusEffectForcedSleeping
        time: 0.1
        type: Add

- type: reagent
  id: STNitryl
  name: stories-reagent-name-nitryl
  desc: stories-reagent-desc-nitryl
  physicalDesc: reagent-physical-desc-gaseous
  flavor: sweet
  color: "#12ca21"
  metabolisms:
    Respiration:
      effects:
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: STNitryl
          min: 60
        ignoreResistances: true
        damage:
          types:
            Poison: 0.03
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.2
        sprintSpeedModifier: 1.2
        time: 0.07
      - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 0.07
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStimulantsStamina
        time: 0.07
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrowsiness
        time: 0.07
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectPainNumbness
        time: 0.07
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        type: Add
        time: 0.07

- type: reagent
  id: STPluoxium
  name: stories-reagent-name-pluoxium
  desc: stories-reagent-desc-pluoxium
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#3434aa"
  metabolisms:
    Respiration:
      effects:
      - !type:Oxygenate
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Human ]
        factor: 5
      - !type:Oxygenate
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Animal ]
        factor: 5
      - !type:Oxygenate
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Rat ]
        factor: 5
      - !type:Oxygenate
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Plant ]
        factor: 5
      - !type:HealthChange #stronger than oxygen, thus even more toxic for vox
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Vox ]
        ignoreResistances: true
        damage:
          types:
            Poison:
              12
      - !type:AdjustAlert
        alertType: Toxins
        conditions:
          - !type:ReagentCondition
            reagent: STPluoxium
            min: 0.5
          - !type:MetabolizerTypeCondition
            type: [ Vox ]
        clear: true
        time: 5
