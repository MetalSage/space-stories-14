- type: conversion
  id: STShadowlingThrall
  statusIcon: STShadowlingThrallFaction
  blacklist:
    components:
    - Zombie
  briefing:
    text: stories-thrall-role-greeting
    color: Red
  endBriefing:
    text: stories-thrall-role-goodbye
    color: Red
  components:
  - type: VisionProvider
    isActive: true
    thermalVision: true
    ambientColor: "#FFFFFF10"
    priority: 10
    toggleAction: STShadowlingActionToggleVision
  - type: ShadowlingThrall
  mindRoles:
  - STMindRoleShadowlingThrall
  channels:
  - STShadowlingMind

- type: conversion
  id: HypnotizedEmpire
  statusIcon: HypnotizedEmpireFaction
  briefing:
    text: hypnosis-empire-role-greeting
    color: Red
    sound:
      path: /Audio/Ambience/Antag/starwars.ogg
      params:
        volume: -5
  endBriefing:
    text: hypnosis-empire-role-goodbye
    color: Red
  components:
  - type: HypnotizedEmpire
  mindRoles:
  - MindRoleHypnotizedEmpireMember
  channels:
  - Empire
