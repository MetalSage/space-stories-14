- type: entity
  id: Blob
  name: Ядро блоба
  description: Оно источает странные импульсы.
  parent:
  - BaseStructure
  - AiHolder
  suffix: Empty
  components:
  - type: Pontific
    actions:
    - STActionBlobKudzu
  - type: Anchorable
    flags:
    - Anchorable
  - type: Rotatable
  - type: WarpPoint
    blacklist:
      tags:
      - GhostOnlyWarp
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: ContainerComp
    proto: AiHeld
    container: station_ai_mind_slot
  - type: Damageable
    damageModifierSet: StrongMetallic
  - type: Repairable
    doAfterDelay: 10
    allowSelfRepair: false
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Breakage" ]
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassReinforced:
            min: 1
            max: 2
          SheetPlasteel:
            min: 2
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: DamageVisuals
    thresholds: [25, 50, 75, 100, 200, 300, 400]
    damageDivisor: 4
    trackAllDamage: true
    damageOverlay:
      sprite: Mobs/Silicon/station_ai_cracks.rsi
  - type: ApcPowerReceiver
    powerLoad: 500
  - type: ExtensionCableReceiver
  - type: Battery
    netsync: false
    maxCharge: 300000
    startingCharge: 300000
  - type: ApcPowerReceiverBattery
    idleLoad: 500
    batteryRechargeRate: 1000
    batteryRechargeEfficiency: 0
  - type: StationAiCore
  - type: StationAiVision
  - type: InteractionOutline
  - type: Sprite
    snapCardinals: true
    sprite: Mobs/Silicon/station_ai.rsi
    layers:
    - state: base
    - state: ai_empty
      map: ["enum.StationAiVisualLayers.Base"]
      shader: unshaded
    - state: ai
      map: ["enum.StationAiVisualLayers.Icon"]
      shader: unshaded
      visible: false
    - state: ai_unpowered
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          False: { visible: true }
          True: { visible: false }
      enum.StationAiVisuals.Broken:
        enum.StationAiVisualLayers.Base:
          False: { state: ai_empty }
          True: { state: ai_error }
  - type: InteractionPopup
    interactSuccessString: petting-success-station-ai
    interactFailureString: petting-failure-station-ai
    messagePerceivedByOthers: petting-success-station-ai-others # Otherwise AI cannot tell its being pet as It's just a brain inside of the core, not the core itself.
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Telephone
    compatibleRanges:
    - Grid
    - Map
    - Unlimited
    listeningRange: 0
    speakerVolume: Speak
    unlistedNumber: true
  - type: Holopad
  - type: StationAiWhitelist
  - type: UserInterface
    interfaces:
      enum.HolopadUiKey.AiRequestWindow:
        type: HolopadBoundUserInterface
      enum.HolopadUiKey.AiActionWindow:
        type: HolopadBoundUserInterface
      enum.StationAiCustomizationUiKey.Key:
        type: StationAiCustomizationBoundUserInterface
  - type: Construction
    graph: StationAiCore
    node: stationAiCore
  - type: ContainerContainer
    containers:
      board: !type:Container
      station_ai_brain_slot: !type:Container
      station_ai_mind_slot: !type:ContainerSlot
        showEnts: true
  - type: ContainerFill
    containers:
      board:
      - StationAiCoreElectronics
  - type: StaticPrice
    price: 5000

- type: entity
  id: BlobSpore
  name: Споры блоба
  parent: BaseKudzu
  description: Они источают странную энергию. Лучше держаться от этого подальше.
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: MeleeSound
      soundGroups:
        Brute:
          path:
            "/Audio/Weapons/slash.ogg"
    - type: Sprite
      sprite: Objects/Misc/fleshkudzu.rsi
      state: kudzu_11
      drawdepth: Overdoors
    - type: KudzuVisuals
    - type: Clickable
    - type: Fixtures
      fixtures:
        fix1:
          hard: false
          density: 7
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          layer:
          - MidImpassable
    - type: Damageable
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 40
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - type: DamageContacts
      damage:
        types:
          Slash: 5
          Piercing: 5
      ignoreWhitelist:
        tags:
        - Flesh
    - type: Kudzu
      growthTickChance: 0.1
      spreadChance: 0.4
      # Heals each time it manages to do a growth tick:
      damageRecovery:
        types:
          Slash: -0.5
          Heat: -1.0
          Cold: -1.0
          Blunt: -0.5 # Needs to be balanced (approx 3x) with vacuum damage to stall but not kill Kudzu
    - type: Barotrauma
      damage:
        types:
          Blunt: 0.10 #per second, scales with pressure and other constants.
    - type: Flammable
      fireSpread: true
      damage:
       types:
         Heat: 3
    - type: AtmosExposed
    - type: Edible
      delay: 0.5
    - type: SpeedModifierContacts
      walkSpeedModifier: 0.2
      sprintSpeedModifier: 0.2
      ignoreWhitelist:
        tags:
        - Flesh
    - type: Tag
      tags:
      - Meat
      - Ruminant

- type: entity
  parent: BaseAction
  id: STActionBlobKudzu
  name: Создать споры
  description: Создать споры которые будут распространятся по станции.
  categories: [HideSpawnMenu]
  components:
  - type: Action
    icon:
      sprite: _Stories/Actions/pontific.rsi
      state: kudzu
    useDelay: 1
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:CreateEntityEvent
      cost: 0
      proto: BlobSpore
