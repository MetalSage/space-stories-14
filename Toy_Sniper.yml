- type: entity
  name: Игрушечная винтовка
  parent: [BaseWeaponSniper, BaseGunWieldable]
  id: ToySniper
  description: Выглядит почти как настоящий христов!
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,3,0
    - 0,1,3,1
  - type: Sprite
    sprite: Objects/Fun/toy_sniper.rsi
  - type: Clothing
    sprite: Objects/Fun/toy_sniper.rsi
  - type: GunRequiresWield
  - type: Gun
    fireRate: 0.4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeCap
    capacity: 5
    proto: CartridgeCap
  - type: SpeedModifiedOnWield
    walkModifier: 0.50
    sprintModifier: 0.50
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3
    pvsIncrease: 0.3
  - type: StaticPrice
    price: 500

- type: entityTable
  id: HappyHonkToySafeEntityTable
  table: !type:GroupSelector
    children:
    - id: ToyMouse
    - id: ToyAi
    - id: ToyNuke
    - id: ToyFigurinePassenger
    - id: ToyFigurineGriffin
    - id: ToyIan
    - id: ToyFigurineOwlman
    - id: ToyFigurineSkeleton
    - id: FoamBlade
    - id: ClothingHeadHatBunny
    - id: PersonalAI
    - id: CrayonBox
    - id: ToySword
    - id: RevolverCapGun
    - id: ToyRubberDuck
    - id: BikeHorn
      weight: 0.5
    - id: GoldenBikeHorn
      weight: 0.8
    - !type:NestedSelector
    - id: ToySniper
      tableId: AllFigurineMechsTable
      weight: 6
