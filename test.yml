- type: entity
  name: Демон
  parent: [ SimpleSpaceMobBase]
  id: MobDemon
  description: Демоническое существо, лучше к нему не подходить.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Mobs/Aliens/Xenos/purple_snake.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: purple_snake
  - type: DamageStateVisuals
    states:
      Alive:
        Base: purple_snake
      Critical:
        Base: dead_purple_snake
      Dead:
        Base: dead_purple_snake
  - type: MobThresholds
    thresholds:
      0: Alive
      500: Dead
  - type: NoSlip
  - type: Hands
  - type: Prying
    enabled: true
    force: true
    pryPowered: true
    speedModifier: 4
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: NpcFactionMember
    factions:
    - Xeno
    - SimpleHostile
  - type: Store
  - type: BatteryAmmoProvider
    proto: BulletDisabler
    fireCost: 100
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRechargeRate: 10
  - type: Gun
    fireRate: 2
    useKey: false
    selectedMode: SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/taser2.ogg
  - type: SlowOnDamage
    speedModifierThresholds:
      300: 0.7
      400: 0.5
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 20
  - type: Puller
    needsHands: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 25
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: ActionGrant
    actions:
      - ActionDemonStore
  - type: VisionProvider
    isActive: false
    ambientColor: "#cc5500"
    priority: 10
    toggleAction: STShadowlingActionToggleVision
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
      - DemonMind
  - type: ActiveRadio
    channels:
    - DemonMind
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: MobCollision
  - type: TTS
    voice: ziggs
  - type: Dragon
    riftPrototype: DemonRift
    soundRoar: /Audio/Weapons/Guns/Gunshots/taser2.ogg
    spawnRiftAction: ActionSpawnRiftDemon
  - type: WarpPoint
    follow: true
  - type: Stamina
    animationThreshold: 250
    baseCritThreshold: 400
  - type: Cuffer
  - type: ZombieImmune

- type: entity
  parent: BaseAction
  id: ActionSpawnRiftDemon
  name: Открыть разлом
  description: Призовите своих слуг при помощи разлома.
  components:
  - type: Action
    icon:
      sprite: Interface/Actions/carp_rift.rsi
      state: icon
    useDelay: 1
    priority: 3
  - type: InstantAction
    event: !type:DragonSpawnRiftActionEvent

- type: radioChannel
  id: DemonMind
  name: Демон
  frequency: 98767
  keycode: "а"
  color: "#cc5500"
  longRange: true

- type: entity
  parent: ActionIntrinsicStore
  id: ActionDemonStore
  name: Магазин Способностей
  description: Откройте магазин способностей, позволяющему раскрыть потенциал вашего демона.

- type: entity
  id: DemonRift
  name: Демонический Разлом
  description: Разлом, ведущий в потустороннюю реальность.
  placement:
    mode: SnapgridCenter
  components:
  - type: DragonRift
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Fixtures
  - type: Sprite
    layers:
    - sprite: Structures/Specific/carp_rift.rsi
      state: icon
      color: "#f07a0c"
      shader: unshaded
    noRot: true # Stories-Fix
  - type: InteractionOutline
  - type: Clickable
  - type: PointLight
    enabled: true
    color: "#e96a02"
    radius: 10.0
    energy: 5.0
    netsync: false
  - type: NavMapBeacon
    color: "#ff0000"
    text: Демонический разлом
    # only show after making the announcement at 50%
    enabled: false
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
